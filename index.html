
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub HTML Launcher</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, #2563eb 0%, transparent 30%),
                radial-gradient(circle at bottom right, #7c3aed 0%, transparent 30%),
                #070b14;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            backdrop-filter: blur(20px);
        }

        .sidebar {
            width: 380px;
            background: rgba(13,17,23,0.92);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            overflow-y: auto;
        }

        .title {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .status {
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 18px;
            color: #cbd5e1;
        }

        .search {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            margin-bottom: 20px;
            transition: 0.25s;
        }

        .search:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96,165,250,0.2);
        }

        .files {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #60a5fa;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: 0.8s;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .path {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .launch {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .launch:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
        }

        .topbar {
            height: 72px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .current {
            font-size: 18px;
            font-weight: 700;
        }

        .refresh {
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.25s;
        }

        .refresh:hover {
            background: rgba(255,255,255,0.14);
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            border-radius: 28px;
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 2px dashed rgba(255,255,255,0.08);
            border-radius: 28px;
            color: #94a3b8;
            gap: 10px;
        }

        .empty h2 {
            font-size: 32px;
        }

        @media (max-width: 900px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 45vh;
            }
        }
    </style>
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div class="title">GitHub Runner</div>

        <div class="desc">
            Automatically detects every HTML file in your GitHub repository and launches it instantly inside the built-in viewer.
        </div>

        <div class="status" id="status">
            Loading repository...
        </div>

        <input class="search" id="search" placeholder="Search HTML files...">

        <div class="files" id="fileList"></div>
    </div>

    <div class="viewer">

        <div class="topbar">
            <div class="current" id="currentFile">
                No file selected
            </div>

            <button class="refresh" onclick="loadRepoFiles()">
                Refresh
            </button>
        </div>

        <div class="empty" id="emptyState">
            <h2>Select a File</h2>
            <p>Your HTML app will appear here.</p>
        </div>

        <iframe id="viewerFrame" style="display:none;"></iframe>

    </div>

</div>

<script>
    // =========================================
    // CHANGE THIS TO YOUR GITHUB REPOSITORY
    // =========================================
    const REPO = "zakaisaidi662-collab/Games";

    // Example:
    // const REPO = "octocat/Hello-World";

    const BRANCH = "main";

    const statusEl = document.getElementById('status');
    const fileListEl = document.getElementById('fileList');
    const searchEl = document.getElementById('search');
    const iframe = document.getElementById('viewerFrame');
    const emptyState = document.getElementById('emptyState');
    const currentFile = document.getElementById('currentFile');

    let htmlFiles = [];

    async function loadRepoFiles() {
        try {
            statusEl.textContent = 'Scanning GitHub repository...';

            const apiUrl = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;

            const response = await fetch(apiUrl);

            if (!response.ok) {
                throw new Error('Failed to load repository.');
            }

            const data = await response.json();

            htmlFiles = data.tree.filter(file =>
                file.path.toLowerCase().endsWith('.html')
            );

            statusEl.textContent = `Found ${htmlFiles.length} HTML file(s)`;

            renderFiles(htmlFiles);

        } catch (err) {
            console.error(err);
            statusEl.textContent = err.message;
        }
    }

    function renderFiles(files) {
        fileListEl.innerHTML = '';

        if (files.length === 0) {
            fileListEl.innerHTML = '<div class="status">No HTML files found.</div>';
            return;
        }

        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'card';

            const rawUrl = `https://rawcdn.githack.com/${REPO}/${BRANCH}/${file.path}`;

            card.innerHTML = `
                <div class="name">${file.path.split('/').pop()}</div>
                <div class="path">${file.path}</div>
                <button class="launch">Launch App</button>
            `;

            card.querySelector('.launch').addEventListener('click', () => {
                iframe.src = rawUrl;
                iframe.style.display = 'block';
                emptyState.style.display = 'none';
                currentFile.textContent = file.path;
            });

            fileListEl.appendChild(card);
        });
    }

    searchEl.addEventListener('input', () => {
        const query = searchEl.value.toLowerCase();

        const filtered = htmlFiles.filter(file =>
            file.path.toLowerCase().includes(query)
        );

        renderFiles(filtered);
    });

    loadRepoFiles();

    // Auto refresh every 30 seconds
    setInterval(loadRepoFiles, 30000);
</script>

</body>
</html>
